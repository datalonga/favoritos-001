<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinkSpace - Favoritos</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>

    <div id="notes-modal" class="modal hidden">
        <div class="modal-overlay"></div>
        <div class="modal-content" style="max-width: 1200px;">
            <h2>Anotações</h2>
            <div class="editor-toolbar">
                <button type="button" onclick="formatText('bold')" title="Negrito"><i data-lucide="bold"></i></button>
                <button type="button" onclick="formatText('italic')" title="Itálico"><i
                        data-lucide="italic"></i></button>
                <button type="button" onclick="formatText('underline')" title="Sublinhado"><i
                        data-lucide="underline"></i></button>
            </div>
            <div id="notes-editor" contenteditable="true" class="rich-text-editor"
                placeholder="Escreva suas anotações aqui..."></div>
            <div class="modal-actions">
                <button type="button" class="btn-text" id="close-notes-modal">Cancelar</button>
                <button type="button" class="btn-solid" id="save-notes-btn">Salvar Anotações</button>
            </div>
        </div>
    </div>

    <div class="app-container">
        <div id="sidebar-overlay" class="overlay"></div>

        <aside id="sidebar" class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <i data-lucide="bookmark"></i>
                    <span>LinkSpace</span>
                </div>
                <button id="close-sidebar" class="icon-btn">
                    <i data-lucide="x"></i>
                </button>
            </div>

            <nav id="category-list" class="category-list"></nav>

            <div id="sidebar-footer" class="sidebar-footer hidden">
                <button id="btn-add-category" class="btn-dashed">
                    <i data-lucide="plus"></i>
                    Adicionar Categoria
                </button>
            </div>
        </aside>

        <main class="main-content">
            <header class="header">
                <div class="header-left">
                    <button id="open-sidebar" class="icon-btn menu-toggle">
                        <i data-lucide="menu"></i>
                    </button>
                    <div class="search-container">
                        <i data-lucide="search" class="search-icon"></i>
                        <input type="text" id="search-input" placeholder="Pesquisar...">
                    </div>
                </div>

                <div class="header-actions">
                    <button id="btn-notes" class="btn-text" style="display: flex; align-items: center; gap: 6px;">
                        <i data-lucide="file-text"></i> Anotações
                    </button>

                    <span id="sync-status" class="sync-status"><i data-lucide="cloud"></i> Nuvem</span>
                    <button id="theme-toggle" class="icon-btn" title="Alternar Tema">
                        <i data-lucide="moon" id="theme-icon"></i>
                    </button>
                    <button id="btn-new-link" class="btn-primary hidden">
                        <i data-lucide="plus"></i>
                        <span>Novo Link</span>
                    </button>
                    <button id="toggle-edit-mode" class="btn-secondary">
                        <i data-lucide="settings-2"></i>
                        <span>Organizar</span>
                    </button>
                </div>

            </header>

            <div class="content-body">
                <div id="current-category-label" class="context-label">Todos</div>
                <div id="bookmarks-grid" class="bookmarks-grid"></div>

                <div id="no-results" class="no-results hidden">
                    <i data-lucide="inbox"></i>
                    <h3>Sem resultados</h3>
                    <p id="no-results-msg">Nenhum link encontrado aqui.</p>
                </div>
            </div>
        </main>

        <div id="bookmark-modal" class="modal hidden">
            <div class="modal-overlay"></div>
            <div class="modal-content">
                <h2 id="modal-title">Novo Link</h2>
                <form id="bookmark-form">
                    <input type="hidden" id="bookmark-id">
                    <div class="form-group">
                        <label>Título</label>
                        <input type="text" id="link-title" required placeholder="Ex: Documentação">
                    </div>
                    <div class="form-group">
                        <label>URL</label>
                        <input type="url" id="link-url" required placeholder="https://">
                    </div>
                    <div class="form-group">
                        <label>Categoria</label>
                        <select id="link-category" required></select>
                    </div>
                    <div class="modal-actions">
                        <button type="button" class="btn-text" id="close-bookmark-modal">Cancelar</button>
                        <button type="submit" class="btn-solid" id="save-bookmark-btn">Salvar</button>
                    </div>
                </form>
            </div>
        </div>

        <div id="category-modal" class="modal hidden">
            <div class="modal-overlay"></div>
            <div class="modal-content mini">
                <h2>Nova Categoria</h2>
                <form id="category-form">
                    <div class="form-group">
                        <label>Nome da Categoria</label>
                        <input type="text" id="category-name" required placeholder="Ex: Artigos">
                    </div>
                    <div class="modal-actions">
                        <button type="button" class="btn-text" id="close-category-modal">Cancelar</button>
                        <button type="submit" class="btn-solid">Criar</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
